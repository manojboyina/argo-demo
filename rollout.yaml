apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: echo-rollout
spec:
  replicas: 2

  selector:
    matchLabels:
      app: echo

  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
      - name: echo
        image: hashicorp/http-echo
        args:
        - "-text=VERSION 2"
        ports:
        - containerPort: 5678

  strategy:
    blueGreen:
      activeService: echo-active
      previewService: echo-preview
      autoPromotionEnabled: false
